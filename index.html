<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 游戏大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== 大厅首页 ===== */
        .lobby {
            padding: 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .lobby-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .lobby-header h1 {
            font-size: 48px;
            background: linear-gradient(90deg, #4ecca3, #7dd3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .lobby-header p {
            color: #94a3b8;
            font-size: 18px;
        }

        /* 游戏卡片网格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .game-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #4ecca3;
            box-shadow: 0 20px 40px rgba(78, 204, 163, 0.2);
        }
        .game-card .cover {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            position: relative;
        }
        .game-card .cover::after {
            content: '▶';
            position: absolute;
            font-size: 40px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .game-card:hover .cover::after {
            opacity: 1;
        }
        .game-card.snake .cover { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        .game-card.tetris .cover { background: linear-gradient(135deg, #1e1b4b, #312e81); }
        .game-card.plane .cover { background: linear-gradient(135deg, #14532d, #166534); }
        .game-card.puzzle .cover { background: linear-gradient(135deg, #7c2d12, #9a3412); }
        .game-card .info {
            padding: 20px;
        }
        .game-card .info h3 {
            font-size: 22px;
            margin-bottom: 6px;
            color: #f1f5f9;
        }
        .game-card .info p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }
        .game-card .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
        }
        .tag.action { background: #4ecca3; color: #0f172a; }
        .tag.puzzle { background: #f59e0b; color: #0f172a; }
        .tag.arcade { background: #3b82f6; color: #fff; }

        /* ===== 全屏游戏层 ===== */
        .game-layer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0f172a;
            z-index: 1000;
            flex-direction: column;
        }
        .game-layer.active {
            display: flex;
        }
        .game-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            height: 56px;
        }
        .game-bar h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: #4ecca3;
            color: #0f172a;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background: #3db892;
        }
        .game-frame {
            flex: 1;
            border: none;
            width: 100%;
            background: #0f172a;
        }
        .game-inline {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <!-- ===== 大厅首页 ===== -->
    <div class="lobby" id="lobby">
        <div class="lobby-header">
            <h1>🎮 游戏大厅</h1>
            <p>点击卡片开始游戏</p>
        </div>

        <div class="game-grid">
            <!-- 贪吃蛇 -->
            <div class="game-card snake" onclick="launchGame('snake', '🐍 贪吃蛇', 'iframe')">
                <div class="cover">🐍</div>
                <div class="info">
                    <h3>贪吃蛇</h3>
                    <p>经典贪吃蛇，高分道具，方向键控制</p>
                    <span class="tag action">动作</span>
                </div>
            </div>

            <!-- 俄罗斯方块 -->
            <div class="game-card tetris" onclick="launchGame('tetris', '🧱 俄罗斯方块', 'iframe')">
                <div class="cover">🧱</div>
                <div class="info">
                    <h3>俄罗斯方块</h3>
                    <p>经典方块消除，旋转/移动/加速</p>
                    <span class="tag puzzle">益智</span>
                </div>
            </div>

            <!-- 飞机大战 -->
            <div class="game-card plane" onclick="launchGame('plane', '✈️ 飞机大战', 'inline')">
                <div class="cover">✈️</div>
                <div class="info">
                    <h3>飞机大战</h3>
                    <p>躲避敌机，拾取道具，坚持更久</p>
                    <span class="tag arcade">街机</span>
                </div>
            </div>

            <!-- 拼图 -->
            <div class="game-card puzzle" onclick="launchGame('puzzle', '🧩 拼图', 'inline')">
                <div class="cover">🧩</div>
                <div class="info">
                    <h3>拼图</h3>
                    <p>滑动拼图，还原图片</p>
                    <span class="tag puzzle">益智</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 全屏游戏层 ===== -->
    <div class="game-layer" id="gameLayer">
        <div class="game-bar">
            <h2 id="gameTitle">🐍 贪吃蛇</h2>
            <button class="btn-back" onclick="backToLobby()">↩ 返回大厅</button>
        </div>

        <!-- iframe 游戏 -->
        <iframe class="game-frame" id="gameFrame" src=""></iframe>

        <!-- 内联游戏容器 -->
        <div class="game-inline" id="inlineContainer">
            <div id="inlineContent"></div>
        </div>
    </div>

    <script>
        // 游戏文件映射（改成你实际的文件名）
        const GAME_FILES = {
            snake: '贪吃蛇.html',   // ← 你桌面已有的文件
            tetris: '俄罗斯方块.html', // ← 桌面已有的俄罗斯方块
            plane: null,            // ← 内联，不需要外部文件
            puzzle: null
        };

        function launchGame(id, title, type) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameLayer').classList.add('active');
            document.getElementById('gameTitle').textContent = title;

            const frame = document.getElementById('gameFrame');
            const inline = document.getElementById('inlineContainer');
            const inlineContent = document.getElementById('inlineContent');

            if (type === 'iframe') {
                frame.style.display = 'block';
                inline.style.display = 'none';
                frame.src = GAME_FILES[id] || 'about:blank';
            } else {
                frame.style.display = 'none';
                inline.style.display = 'flex';
                inlineContent.innerHTML = '<p style="color:#94a3b8;font-size:20px">该游戏暂未制作，请添加代码到 <code>inlineContent</code></p>';
            }
        }

        function backToLobby() {
            document.getElementById('gameLayer').classList.remove('active');
            document.getElementById('lobby').style.display = 'block';
            document.getElementById('gameFrame').src = 'about:blank';
            document.getElementById('inlineContent').innerHTML = '';
        }
    </script>
</body>
</html>
