<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>📦 推箱子</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:#0f172a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; display:flex; flex-direction:column; align-items:center; }

.game-header { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:700px; padding:8px 12px; flex-shrink:0; }
.game-header h1 { font-size:18px; color:#4ecca3; }
.game-header .info { font-size:13px; color:#94a3b8; }
.game-header .info b { color:#fbbf24; }
.game-header .btns { display:flex; gap:6px; }
.game-header button { padding:5px 12px; border:none; border-radius:5px; background:#334155; color:#fff; font-size:12px; cursor:pointer; -webkit-appearance:none; touch-action:manipulation; }
.game-header button:active { background:#475569; transform:scale(0.95); }

.level-tabs { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; padding:0 8px 4px; max-width:700px; }
.level-tab { padding:4px 10px; border:none; border-radius:4px; background:#334155; color:#fff; font-size:12px; cursor:pointer; -webkit-appearance:none; }
.level-tab.active { background:#4ecca3; color:#0f172a; font-weight:bold; }
.level-tab.done { background:#059669; color:#fff; }

.board-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:4px; width:100%; overflow:auto; }
#board { display:grid; gap:1px; background:#1e293b; padding:3px; border-radius:6px; border:2px solid #334155; }
.cell { width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:20px; border-radius:2px; position:relative; }
.cell.wall { background:#475569; }
.cell.floor { background:#0f172a; }
.cell.target { background:#0f172a; }
.cell.target::after { content:''; position:absolute; width:6px; height:6px; background:#fbbf24; border-radius:50%; opacity:0.5; }
.cell.box { background:#0f172a; }
.cell.box::before { content:'📦'; font-size:22px; z-index:2; }
.cell.box-on-target { background:#0f172a; }
.cell.box-on-target::before { content:'📦'; font-size:22px; z-index:2; }
.cell.box-on-target::after { content:''; position:absolute; width:6px; height:6px; background:#fbbf24; border-radius:50%; opacity:0.5; }
.cell.player { background:#0f172a; }
.cell.player::before { content:'🧑‍🏭'; font-size:22px; z-index:2; }
.cell.player-on-target { background:#0f172a; }
.cell.player-on-target::before { content:'🧑‍🏭'; font-size:22px; z-index:2; }
.cell.player-on-target::after { content:''; position:absolute; width:6px; height:6px; background:#fbbf24; border-radius:50%; opacity:0.5; }

@media (max-width:400px) { .cell { width:28px; height:28px; font-size:16px; } .cell.box::before, .cell.box-on-target::before, .cell.player::before, .cell.player-on-target::before { font-size:18px; } }
@media (max-height:500px) { .cell { width:26px; height:26px; font-size:14px; } .cell.box::before, .cell.box-on-target::before, .cell.player::before, .cell.player-on-target::before { font-size:16px; } }

.dpad { display:none; flex-direction:column; align-items:center; gap:4px; padding:4px 8px 8px; flex-shrink:0; }
.dpad-row { display:flex; gap:4px; }
.dpad-btn { width:54px; height:54px; border:none; border-radius:10px; background:#334155; color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; -webkit-user-select:none; -webkit-appearance:none; touch-action:manipulation; }
.dpad-btn:active { background:#475569; transform:scale(0.92); }
@media (max-width:640px) { .dpad { display:flex; } }
@media (max-height:500px) { .dpad-btn { width:40px; height:40px; font-size:16px; } }

.modal { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; }
.modal.show { display:flex; }
.modal-box { background:#1e293b; border-radius:12px; padding:24px 32px; text-align:center; border:2px solid #4ecca3; max-width:90%; }
.modal-box h2 { font-size:24px; color:#4ecca3; margin-bottom:8px; }
.modal-box p { color:#94a3b8; font-size:14px; margin-bottom:16px; }
.modal-box button { padding:8px 24px; border:none; border-radius:6px; background:#4ecca3; color:#0f172a; font-size:15px; font-weight:bold; cursor:pointer; margin:4px; -webkit-appearance:none; }
.modal-box button.secondary { background:#64748b; color:#fff; }
</style>
</head>
<body>

<div class="game-header">
  <div>
    <h1>📦 推箱子</h1>
    <div class="info">关卡 <b id="lvNum">1</b> / <b id="lvTotal">10</b> · 步数 <b id="steps">0</b></div>
  </div>
  <div class="btns">
    <button onclick="game.undo()">↩ 撤销</button>
    <button onclick="game.reset()">🔄 重置</button>
  </div>
</div>

<div class="level-tabs" id="levelTabs"></div>

<div class="board-wrap">
  <div id="board"></div>
</div>

<div class="dpad" id="dpad">
  <div class="dpad-row">
    <div></div>
    <button class="dpad-btn" id="btnUp">▲</button>
    <div></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btnLeft">◀</button>
    <button class="dpad-btn" id="btnDown">▼</button>
    <button class="dpad-btn" id="btnRight">▶</button>
  </div>
</div>

<div class="modal" id="winModal">
  <div class="modal-box">
    <h2>🎉 过关！</h2>
    <p id="winMsg">第 1 关通过！</p>
    <button onclick="game.nextLevel()">下一关 ▶</button>
    <button class="secondary" onclick="game.reset();document.getElementById('winModal').classList.remove('show')">重玩</button>
  </div>
</div>

<script>
/* ===================== 音效系统 ===================== */
const AudioSys = {
  ctx: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  play(type) {
    try {
      this.init();
      const ctx = this.ctx, t = ctx.currentTime;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      switch(type) {
        case 'move': osc.type='sine'; osc.frequency.setValueAtTime(300,t); gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.06); osc.start(t); osc.stop(t+0.06); break;
        case 'push': osc.type='triangle'; osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(100,t+0.08); gain.gain.setValueAtTime(0.2,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.08); osc.start(t); osc.stop(t+0.08); break;
        case 'wall': osc.type='sawtooth'; osc.frequency.setValueAtTime(120,t); gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.05); osc.start(t); osc.stop(t+0.05); break;
        case 'undo': osc.type='sine'; osc.frequency.setValueAtTime(500,t); gain.gain.setValueAtTime(0.1,t); gain.gain.exponentialRampToValueAtTime(0.01,t+0.05); osc.start(t); osc.stop(t+0.05); break;
        case 'win': [523,659,784,1047].forEach((f,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=f; g.gain.setValueAtTime(0.2,t+i*0.12); g.gain.exponentialRampToValueAtTime(0.01,t+i*0.12+0.25); o.start(t+i*0.12); o.stop(t+i*0.12+0.25); }); break;
      }
    } catch(e) {}
  }
};

/* ===================== 关卡数据（箱子=目标点，全部可解） ===================== */
const LEVELS = [
  {
    name: "入门",
    map: [
      "  #####  ",
      "  #   #  ",
      "  # $ #  ",
      "  # . #  ",
      "  # @ #  ",
      "  #####  "
    ]
  },
  {
    name: "转向",
    map: [
      "  #####  ",
      "  #   #  ",
      "  # $ #  ",
      "### . ###",
      "#   $   #",
      "#   .   #",
      "#   @   #",
      "#########"
    ]
  },
  {
    name: "双箱",
    map: [
      "  ####   ",
      "  #  ####",
      "  # $   #",
      "  # . $ #",
      "  # . @ #",
      "  #######"
    ]
  },
  {
    name: "走廊",
    map: [
      "########",
      "#      #",
      "# . $  #",
      "#  . $ #",
      "#   @  #",
      "#      #",
      "########"
    ]
  },
  {
    name: "迷宫",
    map: [
      "  #####  ",
      "###   ###",
      "# $ .   #",
      "#   # $ #",
      "# .   . #",
      "#   $   #",
      "#   @   #",
      "#########"
    ]
  },
  {
    name: "围墙",
    map: [
      "#########",
      "#       #",
      "# .     #",
      "#  $ $  #",
      "# . $ . #",
      "#   @   #",
      "#       #",
      "#########"
    ]
  },
  {
    name: "角落",
    map: [
      "#######",
      "#     #",
      "# .$. #",
      "# $ $ #",
      "# .$. #",
      "#  @  #",
      "#######"
    ]
  },
  {
    name: "通道",
    map: [
      "#########",
      "#       #",
      "# . $ . #",
      "#  $ $  #",
      "#   @ . #",
      "#       #",
      "#########"
    ]
  },
  {
    name: " tricky",
    map: [
      "  ####   ",
      "  #  ####",
      "  # $   #",
      "### . $ #",
      "#     . #",
      "# $ . ###",
      "#   @ #  ",
      "#######  "
    ]
  },
  {
    name: "大师",
    map: [
      "###########",
      "#    #    #",
      "# .  $  . #",
      "#  $ # $  #",
      "# .  $  . #",
      "#    #    #",
      "# . $ $ . #",
      "#    @    #",
      "###########"
    ]
  }
];

/* ===================== 游戏引擎 ===================== */
const game = {
  levelIdx: 0,
  map: [],
  initMap: [],
  playerPos: {x:0, y:0},
  steps: 0,
  history: [],
  completed: new Set(),
  width: 0,
  height: 0,

  init() {
    document.getElementById('lvTotal').textContent = LEVELS.length;
    this.buildTabs();
    this.loadLevel(0);
  },

  buildTabs() {
    const el = document.getElementById('levelTabs');
    el.innerHTML = '';
    LEVELS.forEach((lv, i) => {
      const btn = document.createElement('button');
      btn.className = 'level-tab' + (i===this.levelIdx ? ' active' : '') + (this.completed.has(i) ? ' done' : '');
      btn.textContent = (i+1);
      btn.onclick = () => this.loadLevel(i);
      el.appendChild(btn);
    });
  },

  loadLevel(idx) {
    this.levelIdx = idx;
    this.steps = 0;
    this.history = [];
    document.getElementById('lvNum').textContent = idx + 1;
    document.getElementById('steps').textContent = 0;
    document.getElementById('winModal').classList.remove('show');

    const src = LEVELS[idx].map;
    this.height = src.length;
    this.width = Math.max(...src.map(r => r.length));
    this.map = [];
    this.initMap = [];

    for (let y = 0; y < this.height; y++) {
      const row = [], initRow = [];
      for (let x = 0; x < this.width; x++) {
        const ch = src[y][x] || ' ';
        let cell = 'floor';
        if (ch === '#') cell = 'wall';
        else if (ch === '.') cell = 'target';
        else if (ch === '$') cell = 'box';
        else if (ch === '*') cell = 'box-on-target';
        else if (ch === '@') { cell = 'player'; this.playerPos = {x, y}; }
        else if (ch === '+') { cell = 'player-on-target'; this.playerPos = {x, y}; }
        row.push(cell);
        initRow.push(cell);
      }
      this.map.push(row);
      this.initMap.push([...initRow]);
    }

    this.buildTabs();
    this.render();
  },

  render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${this.width}, 1fr)`;

    for (let y = 0; y < this.height; y++) {
      for (let x = 0; x < this.width; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell ' + this.map[y][x];
        board.appendChild(cell);
      }
    }
    document.getElementById('steps').textContent = this.steps;
  },

  // 判断是否是箱子
  isBox(cell) { return cell === 'box' || cell === 'box-on-target'; },

  // 记录快照
  saveSnapshot() {
    this.history.push({
      map: this.map.map(r => [...r]),
      playerPos: {...this.playerPos},
      steps: this.steps
    });
  },

  move(dx, dy) {
    if (document.getElementById('winModal').classList.contains('show')) return;

    const px = this.playerPos.x;
    const py = this.playerPos.y;
    const nx = px + dx;
    const ny = py + dy;

    if (nx < 0 || nx >= this.width || ny < 0 || ny >= this.height) return;

    const nextCell = this.map[ny][nx];

    // 撞墙
    if (nextCell === 'wall') { AudioSys.play('wall'); return; }

    // 推箱子
    if (this.isBox(nextCell)) {
      const bx = nx + dx;
      const by = ny + dy;
      if (bx < 0 || bx >= this.width || by < 0 || by >= this.height) return;
      const behind = this.map[by][bx];
      if (behind === 'wall' || this.isBox(behind)) { AudioSys.play('wall'); return; }

      this.saveSnapshot();

      // 箱子后面的位置
      this.map[by][bx] = (behind === 'target') ? 'box-on-target' : 'box';

      // 箱子原来的位置变成玩家
      this.map[ny][nx] = (nextCell === 'box-on-target') ? 'player-on-target' : 'player';

      // 玩家原来的位置恢复
      this.map[py][px] = (this.map[py][px] === 'player-on-target') ? 'target' : 'floor';

      this.playerPos = {x: nx, y: ny};
      this.steps++;
      AudioSys.play('push');
      this.render();
      this.checkWin();
      return;
    }

    // 普通移动
    this.saveSnapshot();

    this.map[ny][nx] = (nextCell === 'target') ? 'player-on-target' : 'player';
    this.map[py][px] = (this.map[py][px] === 'player-on-target') ? 'target' : 'floor';

    this.playerPos = {x: nx, y: ny};
    this.steps++;
    AudioSys.play('move');
    this.render();
  },

  undo() {
    if (this.history.length === 0) return;
    const snap = this.history.pop();
    this.map = snap.map.map(r => [...r]);
    this.playerPos = {...snap.playerPos};
    this.steps = snap.steps;
    AudioSys.play('undo');
    this.render();
  },

  reset() {
    this.map = this.initMap.map(r => [...r]);
    this.steps = 0;
    this.history = [];
    // 重新找玩家位置
    for (let y = 0; y < this.height; y++) {
      for (let x = 0; x < this.width; x++) {
        if (this.map[y][x] === 'player' || this.map[y][x] === 'player-on-target') {
          this.playerPos = {x, y};
        }
      }
    }
    document.getElementById('winModal').classList.remove('show');
    this.render();
  },

  checkWin() {
    for (let y = 0; y < this.height; y++) {
      for (let x = 0; x < this.width; x++) {
        if (this.map[y][x] === 'target') return;
      }
    }
    this.completed.add(this.levelIdx);
    document.getElementById('winMsg').textContent = `第 ${this.levelIdx + 1} 关通过！用了 ${this.steps} 步`;
    document.getElementById('winModal').classList.add('show');
    AudioSys.play('win');
    this.buildTabs();
  },

  nextLevel() {
    if (this.levelIdx + 1 < LEVELS.length) {
      this.loadLevel(this.levelIdx + 1);
    } else {
      alert('🎉 恭喜通关所有关卡！');
      this.loadLevel(0);
    }
  }
};

/* ===================== 键盘控制 ===================== */
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': game.move(0, -1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': game.move(0, 1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': game.move(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': game.move(1, 0); e.preventDefault(); break;
    case 'z': case 'Z': game.undo(); break;
    case 'r': case 'R': game.reset(); break;
  }
});

/* ===================== 触摸控制（防误触） ===================== */
function bindTouch(id, dx, dy) {
  const btn = document.getElementById(id);
  if (!btn) return;

  // 使用 touchstart 并阻止默认行为（防止滚动、双击缩放）
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    game.move(dx, dy);
  }, {passive: false, capture: true});

  btn.addEventListener('click', e => {
    e.preventDefault();
    game.move(dx, dy);
  });
}

bindTouch('btnUp', 0, -1);
bindTouch('btnDown', 0, 1);
bindTouch('btnLeft', -1, 0);
bindTouch('btnRight', 1, 0);

// 阻止页面滚动（方向键不滚动页面）
document.addEventListener('touchmove', e => { e.preventDefault(); }, {passive: false});

// 初始化
game.init();
</script>
</body>
</html>
