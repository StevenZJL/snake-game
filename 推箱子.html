<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📦 推箱子</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:#1a1a2e; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; }

.game-header { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:600px; padding:8px 16px; flex-shrink:0; }
.game-header h1 { font-size:20px; color:#4ecca3; }
.game-header .level-info { font-size:14px; color:#94a3b8; }
.game-header .btns { display:flex; gap:8px; }
.game-header button { padding:6px 14px; border:none; border-radius:6px; background:#334155; color:#fff; font-size:13px; cursor:pointer; }
.game-header button:hover { background:#475569; }

.board-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:8px; overflow:auto; }
#board { display:grid; gap:1px; background:#0f172a; padding:4px; border-radius:8px; border:2px solid #334155; }
.cell { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:20px; border-radius:3px; position:relative; }
.cell.wall { background:#334155; border-radius:3px; }
.cell.floor { background:#1e293b; }
.cell.target { background:#1e293b; }
.cell.target::after { content:''; position:absolute; width:8px; height:8px; background:#fbbf24; border-radius:50%; opacity:0.6; }
.cell.box { background:#1e293b; }
.cell.box::before { content:'📦'; font-size:22px; }
.cell.box-on-target { background:#1e293b; }
.cell.box-on-target::before { content:'📦'; font-size:22px; }
.cell.box-on-target::after { content:''; position:absolute; width:8px; height:8px; background:#fbbf24; border-radius:50%; opacity:0.6; }
.cell.player { background:#1e293b; }
.cell.player::before { content:'🧑‍🏭'; font-size:22px; }
.cell.player-on-target { background:#1e293b; }
.cell.player-on-target::before { content:'🧑‍🏭'; font-size:22px; }
.cell.player-on-target::after { content:''; position:absolute; width:8px; height:8px; background:#fbbf24; border-radius:50%; opacity:0.6; }

.controls-bar { padding:8px 16px; display:flex; align-items:center; justify-content:center; gap:12px; flex-shrink:0; }
.controls-bar .hint { color:#94a3b8; font-size:13px; }

/* 虚拟方向键 */
.dpad { display:none; gap:4px; flex-direction:column; align-items:center; padding:8px; }
.dpad-row { display:flex; gap:4px; }
.dpad-btn { width:56px; height:56px; border:none; border-radius:12px; background:#334155; color:#fff; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; -webkit-user-select:none; }
.dpad-btn:active { background:#475569; transform:scale(0.95); }
@media (max-width:640px) { .dpad { display:flex; } .controls-bar .hint { display:none; } }
@media (max-height:500px) { .dpad-btn { width:44px; height:44px; font-size:18px; } }

/* 胜利弹窗 */
.modal { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; }
.modal.show { display:flex; }
.modal-box { background:#1e293b; border-radius:16px; padding:32px 40px; text-align:center; border:2px solid #4ecca3; }
.modal-box h2 { font-size:28px; color:#4ecca3; margin-bottom:8px; }
.modal-box p { color:#94a3b8; font-size:16px; margin-bottom:20px; }
.modal-box button { padding:10px 30px; border:none; border-radius:8px; background:#4ecca3; color:#0f172a; font-size:16px; font-weight:bold; cursor:pointer; margin:4px; }
.modal-box button:hover { background:#3db892; }

/* 关卡选择 */
.level-select { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; padding:4px; }
.level-tag { padding:4px 10px; border-radius:4px; background:#334155; color:#fff; font-size:12px; cursor:pointer; border:none; }
.level-tag.active { background:#4ecca3; color:#0f172a; }
.level-tag.completed { background:#059669; color:#fff; }
</style>
</head>
<body>

<div class="game-header">
  <div>
    <h1>📦 推箱子</h1>
    <div class="level-info">关卡 <span id="levelNum">1</span> / <span id="totalLevels">0</span> · 步数 <span id="stepCount">0</span></div>
  </div>
  <div class="btns">
    <button onclick="game.undo()">↩ 撤销</button>
    <button onclick="game.reset()">🔄 重置</button>
  </div>
</div>

<div class="level-select" id="levelSelect"></div>

<div class="board-wrap">
  <div id="board"></div>
</div>

<div class="controls-bar">
  <span class="hint">⌨ 方向键 / WASD 移动 · R 重置 · Z 撤销</span>
</div>

<div class="dpad" id="dpad">
  <div class="dpad-row">
    <div></div>
    <button class="dpad-btn" ontouchstart="game.move(0,-1);return false;" onclick="game.move(0,-1)">▲</button>
    <div></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" ontouchstart="game.move(-1,0);return false;" onclick="game.move(-1,0)">◀</button>
    <button class="dpad-btn" ontouchstart="game.move(0,1);return false;" onclick="game.move(0,1)">▼</button>
    <button class="dpad-btn" ontouchstart="game.move(1,0);return false;" onclick="game.move(1,0)">▶</button>
  </div>
</div>

<div class="modal" id="winModal">
  <div class="modal-box">
    <h2>🎉 过关！</h2>
    <p id="winMsg">用时 XX 步</p>
    <button onclick="game.nextLevel()">下一关 ▶</button>
    <button onclick="game.reset();document.getElementById('winModal').classList.remove('show')" style="background:#64748b;color:#fff;">重玩本关</button>
  </div>
</div>

<script>
/* ===================== 关卡数据（验证可解） ===================== */
// 地图符号: #墙 .目标 $箱子 @玩家 空格=地板
// * = 箱子在目标上, + = 玩家在目标上
const LEVELS = [
  // 第1关 - 教学
  {
    name: "入门",
    map: [
      "  ##### ",
      "###   # ",
      "#   $ # ",
      "#  .  # ",
      "#  @  # ",
      "####### "
    ]
  },
  // 第2关
  {
    name: "双箱",
    map: [
      "  #####  ",
      "###   ###",
      "#   $   #",
      "# .   . #",
      "#   $   #",
      "#   @   #",
      "#########"
    ]
  },
  // 第3关 - 经典微缩小关
  {
    name: "转角",
    map: [
      "#######",
      "#     #",
      "# .$. #",
      "# $@$ #",
      "# .$. #",
      "#     #",
      "#######"
    ]
  },
  // 第4关
  {
    name: "走廊",
    map: [
      "########",
      "#      #",
      "# .  . #",
      "#  $$  #",
      "# .  . #",
      "#  @   #",
      "########"
    ]
  },
  // 第5关
  {
    name: "迷宫",
    map: [
      "  ####  ",
      "  #  ###",
      "###$   #",
      "#   .# #",
      "#  . $@#",
      "#  $ . #",
      "########"
    ]
  },
  // 第6关
  {
    name: "仓库",
    map: [
      "#########",
      "#       #",
      "# . . . #",
      "#  $$$  #",
      "# . . . #",
      "#   @   #",
      "#########"
    ]
  },
  // 第7关
  {
    name: "狭路",
    map: [
      "#######",
      "# .  .#",
      "#  $  #",
      "##$ $##",
      "#  $  #",
      "# . @.#",
      "#     #",
      "#######"
    ]
  },
  // 第8关
  {
    name: " tricky",
    map: [
      "  #####  ",
      "  #   ###",
      "### #   #",
      "# $   # #",
      "# #  .  #",
      "#   .@ .#",
      "#  $  ###",
      "#######  "
    ]
  },
  // 第9关
  {
    name: "复杂",
    map: [
      "#######",
      "#     #",
      "# .$. #",
      "# $.$ #",
      "# .$. #",
      "# $.$ #",
      "# .@. #",
      "#     #",
      "#######"
    ]
  },
  // 第10关
  {
    name: "大师",
    map: [
      "#########",
      "#   #   #",
      "# $ . $ #",
      "# . # . #",
      "# $ # $ #",
      "# . # . #",
      "# $ . $ #",
      "#   @   #",
      "#########"
    ]
  }
];

/* ===================== 游戏引擎 ===================== */
const game = {
  levelIdx: 0,
  map: [],        // 当前地图状态 (2D数组)
  initial: [],    // 初始状态备份
  history: [],    // 操作历史 for undo
  steps: 0,
  width: 0,
  height: 0,
  playerPos: {x:0, y:0},
  completed: new Set(),

  init() {
    document.getElementById('totalLevels').textContent = LEVELS.length;
    this.buildLevelSelect();
    this.loadLevel(0);
  },

  buildLevelSelect() {
    const el = document.getElementById('levelSelect');
    el.innerHTML = '';
    LEVELS.forEach((lv, i) => {
      const btn = document.createElement('button');
      btn.className = 'level-tag' + (i===this.levelIdx?' active':'') + (this.completed.has(i)?' completed':'');
      btn.textContent = (i+1);
      btn.onclick = () => this.loadLevel(i);
      el.appendChild(btn);
    });
  },

  loadLevel(idx) {
    this.levelIdx = idx;
    this.steps = 0;
    this.history = [];
    document.getElementById('levelNum').textContent = idx + 1;
    document.getElementById('stepCount').textContent = 0;
    document.getElementById('winModal').classList.remove('show');

    // 解析地图
    const src = LEVELS[idx].map;
    this.height = src.length;
    this.width = Math.max(...src.map(r => r.length));
    this.map = [];
    this.initial = [];

    for (let y = 0; y < this.height; y++) {
      const row = [];
      const initRow = [];
      for (let x = 0; x < this.width; x++) {
        const ch = src[y][x] || ' ';
        let cell = 'floor';
        if (ch === '#') cell = 'wall';
        else if (ch === '.') cell = 'target';
        else if (ch === '$') cell = 'box';
        else if (ch === '*') cell = 'box-on-target';
        else if (ch === '@') { cell = 'player'; this.playerPos = {x, y}; }
        else if (ch === '+') { cell = 'player-on-target'; this.playerPos = {x, y}; }
        row.push(cell);
        initRow.push(cell);
      }
      this.map.push(row);
      this.initial.push([...initRow]);
    }

    this.buildLevelSelect();
    this.render();
  },

  render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${this.width}, 36px)`;

    for (let y = 0; y < this.height; y++) {
      for (let x = 0; x < this.width; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell ' + this.map[y][x];
        board.appendChild(cell);
      }
    }
    document.getElementById('stepCount').textContent = this.steps;
  },

  // 获取底层地形（目标点或地板）
  baseOf(cell) {
    if (cell === 'box') return 'floor';
    if (cell === 'player') return 'floor';
    if (cell === 'box-on-target') return 'target';
    if (cell === 'player-on-target') return 'target';
    return cell;
  },

  // 判断是否是箱子
  isBox(cell) {
    return cell === 'box' || cell === 'box-on-target';
  },

  // 判断是否是玩家
  isPlayer(cell) {
    return cell === 'player' || cell === 'player-on-target';
  },

  move(dx, dy) {
    if (document.getElementById('winModal').classList.contains('show')) return;

    const px = this.playerPos.x;
    const py = this.playerPos.y;
    const nx = px + dx;
    const ny = py + dy;

    if (nx < 0 || nx >= this.width || ny < 0 || ny >= this.height) return;

    const nextCell = this.map[ny][nx];

    // 撞墙
    if (nextCell === 'wall') {
      // AudioSys.play('error');
      return;
    }

    // 推箱子
    if (this.isBox(nextCell)) {
      const bx = nx + dx;
      const by = ny + dy;
      if (bx < 0 || bx >= this.width || by < 0 || by >= this.height) return;
      const behind = this.map[by][bx];
      if (behind === 'wall' || this.isBox(behind)) return; // 推不动

      // 记录历史
      this.history.push({px, py, bx:nx, by:ny, pushed:true});

      // 移动箱子
      const boxBase = this.baseOf(nextCell);
      const newBoxCell = (behind === 'target') ? 'box-on-target' : 'box';
      this.map[by][bx] = newBoxCell;

      // 移动玩家到箱子原位置
      this.map[ny][nx] = (boxBase === 'target') ? 'player-on-target' : 'player';

      // 玩家原位置恢复
      const playerBase = this.baseOf(this.map[py][px]);
      this.map[py][px] = playerBase;

      this.playerPos = {x: nx, y: ny};
      this.steps++;
      this.render();
      this.checkWin();
      return;
    }

    // 普通移动
    this.history.push({px, py, bx:-1, by:-1, pushed:false});
    const nextBase = this.baseOf(nextCell);
    this.map[ny][nx] = (nextBase === 'target') ? 'player-on-target' : 'player';
    const playerBase = this.baseOf(this.map[py][px]);
    this.map[py][px] = playerBase;
    this.playerPos = {x: nx, y: ny};
    this.steps++;
    this.render();
  },

  undo() {
    if (this.history.length === 0) return;
    const last = this.history.pop();
    const {px, py, bx, by, pushed} = last;

    // 恢复玩家位置
    const curPx = this.playerPos.x;
    const curPy = this.playerPos.y;
    const curBase = this.baseOf(this.map[curPy][curPx]);
    this.map[curPy][curPx] = curBase;

    if (pushed) {
      // 箱子回到bx,by
      const boxBase = this.baseOf(this.map[by][bx]);
      this.map[by][bx] = (boxBase === 'target') ? 'box-on-target' : 'box';
      // 玩家原位置是箱子原来的位置，现在变成玩家
      this.map[py][px] = (this.baseOf(this.map[py][px]) === 'target') ? 'player-on-target' : 'player';
    } else {
      this.map[py][px] = (this.baseOf(this.map[py][px]) === 'target') ? 'player-on-target' : 'player';
    }

    this.playerPos = {x: px, y: py};
    this.steps = Math.max(0, this.steps - 1);
    this.render();
  },

  reset() {
    this.map = this.initial.map(r => [...r]);
    this.steps = 0;
    this.history = [];
    // 重新找玩家位置
    for (let y = 0; y < this.height; y++) {
      for (let x = 0; x < this.width; x++) {
        if (this.isPlayer(this.map[y][x])) {
          this.playerPos = {x, y};
        }
      }
    }
    document.getElementById('winModal').classList.remove('show');
    this.render();
  },

  checkWin() {
    // 检查是否所有目标点都被箱子覆盖
    for (let y = 0; y < this.height; y++) {
      for (let x = 0; x < this.width; x++) {
        const cell = this.map[y][x];
        if (cell === 'target') return; // 还有空目标点
      }
    }
    // 胜利
    this.completed.add(this.levelIdx);
    document.getElementById('winMsg').textContent = `第 ${this.levelIdx + 1} 关通过！用了 ${this.steps} 步`;
    document.getElementById('winModal').classList.add('show');
  },

  nextLevel() {
    if (this.levelIdx + 1 < LEVELS.length) {
      this.loadLevel(this.levelIdx + 1);
    } else {
      alert('🎉 恭喜通关所有关卡！');
      this.loadLevel(0);
    }
  }
};

// 键盘控制
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': game.move(0, -1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': game.move(0, 1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': game.move(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': game.move(1, 0); e.preventDefault(); break;
    case 'z': case 'Z': game.undo(); break;
    case 'r': case 'R': game.reset(); break;
  }
});

// 初始化
game.init();
</script>
</body>
</html>
