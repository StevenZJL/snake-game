<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff; overflow: hidden; touch-action: none; -webkit-touch-callout: none;
            -webkit-user-select: none; user-select: none;
        }
        h1 { margin-bottom: 8px; font-size: 36px; color: #4ecca3; }
        .score-board { display: flex; gap: 30px; margin-bottom: 10px; font-size: 18px; }
        .score-board span { color: #aaa; }
        .score-board strong { color: #4ecca3; font-size: 24px; }
        .bonus-info { color: #ffd700; font-size: 14px; margin-bottom: 8px; height: 20px; }
        canvas {
            border: 3px solid #4ecca3; border-radius: 6px; background: #16213e;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.25);
            max-width: 95vw; max-height: 55vh; touch-action: none;
        }
        .controls { margin-top: 12px; text-align: center; color: #888; font-size: 13px; }
        .controls p { margin: 3px 0; }

        /* 虚拟方向键 */
        .dpad {
            display: none;
            margin-top: 10px;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 6px;
            justify-content: center;
        }
        .dpad .dpad-btn {
            width: 60px; height: 60px;
            background: rgba(78, 204, 163, 0.15);
            border: 2px solid rgba(78, 204, 163, 0.4);
            border-radius: 12px;
            color: #4ecca3;
            font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; touch-action: manipulation;
            -webkit-appearance: none; appearance: none;
        }
        .dpad .dpad-btn:active {
            background: rgba(78, 204, 163, 0.4);
            transform: scale(0.95);
        }
        .dpad .dpad-empty { background: none; border: none; pointer-events: none; }

        /* 功能按钮 */
        .action-btns {
            display: none;
            margin-top: 10px;
            gap: 10px;
        }
        .action-btns .act-btn {
            padding: 10px 24px;
            font-size: 15px; font-weight: bold;
            border: none; border-radius: 8px;
            cursor: pointer; touch-action: manipulation;
            -webkit-appearance: none; appearance: none;
        }
        .act-btn.start { background: #4ecca3; color: #1a1a2e; }
        .act-btn.pause { background: #f39c12; color: #1a1a2e; }
        .act-btn.boost { background: #e74c3c; color: #fff; }
        .act-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* 手机端显示虚拟按键 */
        @media (hover: none) and (pointer: coarse) {
            .dpad, .action-btns { display: grid; }
            .controls { display: none; }
            h1 { font-size: 28px; }
            .score-board { gap: 20px; font-size: 15px; }
            .score-board strong { font-size: 20px; }
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.88); z-index: 100; display: none;
        }
        .overlay-box {
            text-align: center; background: #0f172a;
            padding: 40px 60px; border-radius: 12px; border: 2px solid #4ecca3;
        }
        .overlay-box h2 { font-size: 38px; margin-bottom: 16px; }
        .overlay-box p { font-size: 20px; margin-bottom: 8px; color: #ccc; }
        .overlay-box button {
            margin-top: 20px; padding: 12px 40px; font-size: 20px;
            border: none; border-radius: 8px; background: #4ecca3;
            color: #1a1a2e; cursor: pointer; font-weight: bold;
            touch-action: manipulation; -webkit-appearance: none; appearance: none;
        }
        .overlay-box button:hover { background: #3db892; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div class="score-board">
        <div>得分: <strong id="score">0</strong></div>
        <div>最高分: <strong id="high">0</strong></div>
    </div>
    <div class="bonus-info" id="bonusInfo"></div>
    <canvas id="game" width="800" height="800"></canvas>

    <!-- 虚拟方向键 -->
    <div class="dpad">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btnUp">↑</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" id="btnLeft">←</button>
        <button class="dpad-btn" id="btnDown">↓</button>
        <button class="dpad-btn" id="btnRight">→</button>
    </div>

    <!-- 功能按钮 -->
    <div class="action-btns" style="display:flex;">
        <button class="act-btn start" id="btnActStart">开始</button>
        <button class="act-btn pause" id="btnActPause">暂停</button>
        <button class="act-btn boost" id="btnActBoost">加速</button>
    </div>

    <div class="controls">
        <p>↵ 回车开始 / 重新开始 ｜ ← ↑ ↓ → 方向键</p>
        <p>ESC 暂停 / 继续 ｜ 空格 按住加速</p>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-box">
            <h2 style="color:#4ecca3">贪吃蛇</h2>
            <p>按回车开始游戏</p>
            <button id="btnStart">开始游戏</button>
        </div>
    </div>

    <div class="overlay" id="pauseOverlay">
        <div class="overlay-box" style="border-color:#f39c12">
            <h2 style="color:#f39c12">已暂停</h2>
            <p>按 ESC 继续</p>
        </div>
    </div>

    <div class="overlay" id="overOverlay">
        <div class="overlay-box" style="border-color:#e74c3c">
            <h2 style="color:#e74c3c">游戏结束</h2>
            <p>最终得分: <strong id="finalScore" style="color:#4ecca3">0</strong></p>
            <p>按回车重新开始</p>
            <button id="btnRestart">重新开始</button>
        </div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highEl = document.getElementById('high');
        const finalScoreEl = document.getElementById('finalScore');
        const bonusInfoEl = document.getElementById('bonusInfo');
        const startOverlay = document.getElementById('startOverlay');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const overOverlay = document.getElementById('overOverlay');

        const gridSize = 25;
        const tileCount = 32;
        const BASE_SPEED = 140;
        const BOOST_SPEED = 60;

        let snake = [], food = {}, dx = 0, dy = 0, score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
        let state = 'start'; // start / running / paused / over
        let boosting = false;
        let lastFrame = 0;
        let lastUpdateTime = 0;
        let nextDir = null;

        // 高分道具系统
        let bonus = null;
        let foodsEaten = 0;
        const BONUS_POINTS = 50;
        const BONUS_DURATION = 10;
        const BONUS_CHANCE = 0.4;
        const BONUS_MIN_INTERVAL = 2;
        const BONUS_MAX_INTERVAL = 5;

        highEl.textContent = highScore;

        function initSnake() {
            snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
            dx = 1; dy = 0;
        }
        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            for (let s of snake) { if (s.x === food.x && s.y === food.y) { placeFood(); return; } }
        }
        function placeBonus() {
            let bx = Math.floor(Math.random() * tileCount);
            let by = Math.floor(Math.random() * tileCount);
            for (let s of snake) { if (s.x === bx && s.y === by) { placeBonus(); return; } }
            if (bx === food.x && by === food.y) { placeBonus(); return; }
            bonus = { x: bx, y: by, points: BONUS_POINTS, timer: BONUS_DURATION, maxTimer: BONUS_DURATION, flashPhase: 0 };
        }
        function clearBonus() { bonus = null; bonusInfoEl.textContent = ''; }

        function trySpawnBonus() {
            if (bonus) return;
            if (foodsEaten >= BONUS_MIN_INTERVAL) {
                const force = foodsEaten >= BONUS_MAX_INTERVAL;
                if (force || Math.random() < BONUS_CHANCE) { placeBonus(); foodsEaten = 0; }
            }
        }

        function startGame() {
            score = 0; scoreEl.textContent = '0';
            initSnake(); placeFood(); state = 'running';
            startOverlay.style.display = 'none';
            overOverlay.style.display = 'none';
            bonus = null; foodsEaten = 0; bonusInfoEl.textContent = '';
            lastUpdateTime = 0;
        }
        function togglePause() {
            if (state === 'running') { state = 'paused'; pauseOverlay.style.display = 'flex'; }
            else if (state === 'paused') { state = 'running'; pauseOverlay.style.display = 'none'; lastUpdateTime = 0; }
        }
        function gameOver() {
            state = 'over'; finalScoreEl.textContent = score; overOverlay.style.display = 'flex';
            if (score > highScore) { highScore = score; localStorage.setItem('snakeHigh', highScore); highEl.textContent = highScore; }
        }

        function update(timestamp) {
            if (state !== 'running') return;
            const dt = lastUpdateTime ? (timestamp - lastUpdateTime) / 1000 : 0;
            lastUpdateTime = timestamp;
            if (nextDir) { dx = nextDir.dx; dy = nextDir.dy; nextDir = null; }
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) { gameOver(); return; }
            for (let s of snake) { if (head.x === s.x && head.y === s.y) { gameOver(); return; } }
            snake.unshift(head);
            let ate = false;
            if (head.x === food.x && head.y === food.y) {
                score += 10; foodsEaten++; ate = true; scoreEl.textContent = score; placeFood(); trySpawnBonus();
            }
            if (bonus && head.x === bonus.x && head.y === bonus.y) {
                score += bonus.points; scoreEl.textContent = score; clearBonus(); ate = true;
            }
            if (!ate) { snake.pop(); }
            if (bonus) {
                bonus.timer -= dt;
                bonus.flashPhase += 1;
                if (bonus.timer <= 0) { clearBonus(); }
                else { bonusInfoEl.textContent = `⭐ 高分道具 +${bonus.points}分！剩余 ${Math.ceil(bonus.timer)} 秒`; }
            }
        }

        function draw() {
            ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#0f3460'; ctx.lineWidth = 0.6;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize); ctx.stroke();
            }
            ctx.fillStyle = '#e74c3c'; ctx.beginPath();
            ctx.arc(food.x*gridSize+gridSize/2, food.y*gridSize+gridSize/2, gridSize/2-3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff6b6b'; ctx.beginPath();
            ctx.arc(food.x*gridSize+gridSize/2-3, food.y*gridSize+gridSize/2-3, 3, 0, Math.PI*2); ctx.fill();

            if (bonus) {
                const flash = (bonus.flashPhase % 6) < 3;
                const cx = bonus.x*gridSize + gridSize/2;
                const cy = bonus.y*gridSize + gridSize/2;
                ctx.fillStyle = flash ? 'rgba(255,215,0,0.25)' : 'rgba(255,215,0,0.1)';
                ctx.beginPath(); ctx.arc(cx, cy, gridSize/2+2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffd700';
                drawStar(ctx, cx, cy, 5, gridSize/2-2, gridSize/4-1);
            }

            for (let i = 0; i < snake.length; i++) {
                const s = snake[i];
                if (i === 0) ctx.fillStyle = '#4ecca3';
                else { const r = i / snake.length; ctx.fillStyle = `rgb(${45+r*28},${138-r*40},${110-r*20})`; }
                ctx.fillRect(s.x*gridSize+1, s.y*gridSize+1, gridSize-2, gridSize-2);
                if (i === 0) {
                    ctx.fillStyle = '#1a1a2e'; const e = 4;
                    if (dx===1) { ctx.fillRect(s.x*gridSize+16,s.y*gridSize+6,e,e); ctx.fillRect(s.x*gridSize+16,s.y*gridSize+15,e,e); }
                    else if (dx===-1) { ctx.fillRect(s.x*gridSize+5,s.y*gridSize+6,e,e); ctx.fillRect(s.x*gridSize+5,s.y*gridSize+15,e,e); }
                    else if (dy===-1) { ctx.fillRect(s.x*gridSize+6,s.y*gridSize+5,e,e); ctx.fillRect(s.x*gridSize+15,s.y*gridSize+5,e,e); }
                    else { ctx.fillRect(s.x*gridSize+6,s.y*gridSize+16,e,e); ctx.fillRect(s.x*gridSize+15,s.y*gridSize+16,e,e); }
                }
            }
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let x = cx; let y = cy;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function setDirection(ndx, ndy) {
            if (state !== 'running') return;
            if (dx === 0 && ndx !== 0 && Math.abs(ndx) !== Math.abs(dx)) { nextDir = {dx: ndx, dy: 0}; }
            else if (dy === 0 && ndy !== 0 && Math.abs(ndy) !== Math.abs(dy)) { nextDir = {dx: 0, dy: ndy}; }
        }

        function onKey(e) {
            const k = e.key || e.code;
            const code = e.keyCode || e.which;
            if (k === 'Enter' || code === 13) {
                e.preventDefault();
                if (state === 'start' || state === 'over') startGame();
                return;
            }
            if (k === 'Escape' || code === 27) {
                e.preventDefault();
                if (state === 'running' || state === 'paused') togglePause();
                return;
            }
            if (k === ' ' || k === 'Space' || code === 32) {
                e.preventDefault();
                if (state === 'running') boosting = true;
                return;
            }
            let handled = false;
            if (k === 'ArrowUp' || k === 'Up' || code === 38) { setDirection(0, -1); handled = true; }
            else if (k === 'ArrowDown' || k === 'Down' || code === 40) { setDirection(0, 1); handled = true; }
            else if (k === 'ArrowLeft' || k === 'Left' || code === 37) { setDirection(-1, 0); handled = true; }
            else if (k === 'ArrowRight' || k === 'Right' || code === 39) { setDirection(1, 0); handled = true; }
            if (handled) { e.preventDefault(); }
        }

        window.addEventListener('keydown', onKey, true);
        window.addEventListener('keyup', function(e) {
            if (e.key === ' ' || e.key === 'Space' || e.keyCode === 32) boosting = false;
        }, true);

        document.getElementById('btnStart').addEventListener('click', startGame);
        document.getElementById('btnRestart').addEventListener('click', startGame);

        // 虚拟按键事件
        function bindBtn(id, fn, startFn, endFn) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', function(e) { e.preventDefault(); if (startFn) startFn(); else fn(); }, {passive:false});
            el.addEventListener('touchend', function(e) { e.preventDefault(); if (endFn) endFn(); }, {passive:false});
            el.addEventListener('mousedown', function(e) { e.preventDefault(); if (startFn) startFn(); else fn(); });
            el.addEventListener('mouseup', function(e) { e.preventDefault(); if (endFn) endFn(); });
            el.addEventListener('mouseleave', function(e) { if (endFn) endFn(); });
        }
        bindBtn('btnUp',    function() { setDirection(0, -1); });
        bindBtn('btnDown',  function() { setDirection(0, 1); });
        bindBtn('btnLeft',  function() { setDirection(-1, 0); });
        bindBtn('btnRight', function() { setDirection(1, 0); });
        bindBtn('btnActStart', function() { if (state === 'start' || state === 'over') startGame(); });
        bindBtn('btnActPause', function() { if (state === 'running' || state === 'paused') togglePause(); });
        bindBtn('btnActBoost', null, function() { if (state === 'running') boosting = true; }, function() { boosting = false; });

        // 触摸滑动支持
        let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
        canvas.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartTime = Date.now();
            }
        }, {passive:true});
        canvas.addEventListener('touchend', function(e) {
            if (!touchStartX && !touchStartY) return;
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const dt = Date.now() - touchStartTime;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 10 || dt > 500) { touchStartX = touchStartY = 0; return; }
            if (Math.abs(dx) > Math.abs(dy)) {
                setDirection(dx > 0 ? 1 : -1, 0);
            } else {
                setDirection(0, dy > 0 ? 1 : -1);
            }
            touchStartX = touchStartY = 0;
        }, {passive:true});

        function loop(timestamp) {
            const interval = boosting ? BOOST_SPEED : BASE_SPEED;
            if (timestamp - lastFrame >= interval) { update(timestamp); lastFrame = timestamp; }
            draw();
            requestAnimationFrame(loop);
        }

        initSnake(); placeFood(); draw();
        startOverlay.style.display = 'flex';
        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
